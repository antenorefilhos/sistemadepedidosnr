<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-label="Produto sem foto">
  <rect width="400" height="400" fill="#e8e8e8"/>
  <!-- moldura da imagem -->
  <rect x="120" y="130" width="160" height="120" rx="10" fill="none" stroke="#aaaaaa" stroke-width="8"/>
  <!-- círculo (sol) -->
  <circle cx="228" cy="158" r="18" fill="none" stroke="#aaaaaa" stroke-width="8"/>
  <!-- montanhas -->
  <polyline points="120,235 158,193 183,213 218,183 280,235" fill="none" stroke="#aaaaaa" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- linha diagonal (riscado) -->
  <line x1="90" y1="90" x2="310" y2="310" stroke="#aaaaaa" stroke-width="9" stroke-linecap="round"/>
  <!-- texto -->
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#aaaaaa" letter-spacing="2">PRODUTO SEM FOTO</text>
</svg>
