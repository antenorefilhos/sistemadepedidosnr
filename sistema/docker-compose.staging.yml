# docker-compose.staging.yml
# Ambiente de homologação (staging) — isolado do ambiente local (dev).
#
# Portas staging vs local:
#   loja:       http://localhost:4000
#   api:        http://localhost:4001
#   admin:      http://localhost:4002
#   banco:      localhost:5433
#   meili:      http://localhost:7701
#
# Para subir: docker compose --env-file .env.staging -f docker-compose.staging.yml up -d --build
# Sem .env.staging, os defaults locais abaixo continuam validos.
# Para parar: docker compose -f docker-compose.staging.yml down
# Para remover volumes: docker compose -f docker-compose.staging.yml down -v

services:

  db_staging:
    image: postgres:15-alpine
    container_name: antenor_db_staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: antenor_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: antenor_staging_2026
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    networks:
      - antenor_staging_network
    ports:
      - "5433:5432"

  redis_staging:
    image: redis:7-alpine
    container_name: antenor_redis_staging
    restart: unless-stopped
    networks:
      - antenor_staging_network

  meili_staging:
    image: getmeili/meilisearch:v1.11
    container_name: antenor_meili_staging
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: antenor_meili_staging_2026
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_staging_data:/meili_data
    networks:
      - antenor_staging_network
    ports:
      - "7701:7700"

  api_staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: antenor_api_staging
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:antenor_staging_2026@db_staging:5432/antenor_staging?schema=public
      REDIS_URL: redis://redis_staging:6379
      NODE_ENV: staging
      PORT: 3001
      MEILI_HOST: http://meili_staging:7700
      MEILI_MASTER_KEY: antenor_meili_staging_2026
      JWT_SECRET: ${STAGING_JWT_SECRET:-staging-jwt-secret-change-before-production}
      CORS_ORIGIN: ${STAGING_CORS_ORIGIN:-http://localhost:4000,http://localhost:4002}
      FRONTEND_URL: ${STAGING_FRONTEND_URL:-http://localhost:4000}
      ADMIN_URL: ${STAGING_ADMIN_URL:-http://localhost:4002}
      ALLOW_GUEST_CHECKOUT: "true"
      ENABLE_LEGACY_CLASSIFICATION_MAPPINGS: "false"
      VAPID_PUBLIC_KEY: ${STAGING_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${STAGING_VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${STAGING_VAPID_SUBJECT:-mailto:admin@antenor.com.br}
    depends_on:
      - db_staging
      - redis_staging
      - meili_staging
    volumes:
      - ./backend/uploads_staging:/app/uploads
    networks:
      - antenor_staging_network
    ports:
      - "4001:3001"

  storefront_staging:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
        VITE_GUEST_CHECKOUT_ENABLED: "true"
        VITE_PAYMENTS_UI_ENABLED: "false"
        VITE_MAPBOX_ACCESS_TOKEN: ${VITE_MAPBOX_ACCESS_TOKEN:-}
        VITE_VAPID_PUBLIC_KEY: ${STAGING_VAPID_PUBLIC_KEY:-}
    container_name: antenor_storefront_staging
    restart: unless-stopped
    depends_on:
      - api_staging
    networks:
      - antenor_staging_network
    ports:
      - "4000:80"
    volumes:
      - ./frontend/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro

  admin_staging:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    container_name: antenor_admin_staging
    restart: unless-stopped
    depends_on:
      - api_staging
    networks:
      - antenor_staging_network
    ports:
      - "4002:80"
    volumes:
      - ./admin/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  antenor_staging_network:
    driver: bridge

volumes:
  pgdata_staging:
  meili_staging_data:
